<svg width="1254" height="1254" viewBox="0 0 1254 1254" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ClaimBound public benchmarks logo</title>
  <desc id="desc">A clean vector logo with a bounded evidence icon, ClaimBound wordmark, and public benchmarks subtitle.</desc>

  <defs>
    <linearGradient id="ringBlue" x1="73" y1="453" x2="348" y2="793" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E64BA"/>
      <stop offset="0.55" stop-color="#0C75C8"/>
      <stop offset="1" stop-color="#0A5FAB"/>
    </linearGradient>
    <linearGradient id="ringTeal" x1="221" y1="792" x2="403" y2="594" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#18B7A3"/>
      <stop offset="1" stop-color="#089EBC"/>
    </linearGradient>
    <linearGradient id="signalGradient" x1="61" y1="628" x2="404" y2="628" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E64BA"/>
      <stop offset="0.43" stop-color="#0877C4"/>
      <stop offset="0.72" stop-color="#0A97BB"/>
      <stop offset="1" stop-color="#14B69E"/>
    </linearGradient>
    <linearGradient id="waveText" x1="806" y1="520" x2="1198" y2="632" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E73CC"/>
      <stop offset="0.55" stop-color="#1687D9"/>
      <stop offset="1" stop-color="#0D77CD"/>
    </linearGradient>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0D3B66" flood-opacity="0.05"/>
    </filter>
  </defs>

  <!-- White background intentionally preserved with equal visual breathing room above and below the logo. -->
  <rect width="1254" height="1254" fill="#FFFFFF"/>

  <g id="claimbound-logo" filter="url(#softShadow)">
    <!-- Icon: open benchmark ring -->
    <g id="claimbound-icon" stroke-linecap="butt" stroke-linejoin="round">
      <!-- subtle benchmark grid -->
      <g stroke="#CBD3DC" stroke-width="3.2" stroke-linecap="round" stroke-dasharray="10 12" opacity="0.72">
        <path d="M130 507V714"/>
        <path d="M162 490V719"/>
        <path d="M199 491V719"/>
        <path d="M230 471V726"/>
        <path d="M276 521V690"/>
        <path d="M327 508V650"/>
        <path d="M128 520H277"/>
        <path d="M128 595H327"/>
        <path d="M128 672H355"/>
      </g>

      <!-- open circular ring; centered vertically to preserve top/bottom white space -->
      <path d="M342.6 514.3A160 160 0 1 0 230 787" stroke="url(#ringBlue)" stroke-width="23"/>
      <path d="M230 787A160 160 0 0 0 388.4 649.3" stroke="url(#ringTeal)" stroke-width="23"/>

      <!-- waveform signal -->
      <path d="M63 629.5C87 616.4 104.3 613.6 121.2 632.2C140.7 653.8 153.4 651.6 162.1 616.2C173.8 568.5 182.5 527.5 198.9 527.5C217.5 527.5 228.4 590.6 240.3 630.8C253.4 675.4 268.6 682.8 284.6 641.5C303.5 592.9 315.2 567.6 333.7 574.7C352.6 582 355.7 635.1 376.6 634.9C386.2 634.8 394 630.4 402 626.8" stroke="url(#signalGradient)" stroke-width="11.5" stroke-linecap="round"/>

      <!-- validation check mark -->
      <path d="M284 684.5L307.5 707.7L353 657" stroke="#12B4A4" stroke-width="10.5" stroke-linecap="square"/>
    </g>

    <!-- Wordmark -->
    <g id="claimbound-wordmark">
      <text x="428" y="633" font-family="Inter, Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="124" font-weight="700" letter-spacing="-2" fill="#082F59">Claim</text>
      <text x="792" y="633" font-family="Inter, Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="124" font-weight="700" letter-spacing="-2" fill="url(#waveText)">Bound</text>
      <line x1="436" y1="700" x2="514" y2="700" stroke="#11AFA9" stroke-width="4"/>
      <text x="542" y="717" font-family="Inter, Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="38" font-weight="500" letter-spacing="13" fill="#082F59">public benchmarks</text>
      <line x1="1120" y1="700" x2="1194" y2="700" stroke="#11AFA9" stroke-width="4"/>
    </g>
  </g>
</svg>
