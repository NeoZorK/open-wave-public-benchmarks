name: Documentation or tooling improvement
description: Request documentation changes or benchmark-tooling enhancements consistent with reproducibility discipline.
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Enhancements stay within public benchmark boundaries: reproducibility honesty,
        pre-registered comparators, sanitized evidence summaries. Non-goals belong in
        [docs/CLAIMS.md](https://github.com/NeoZorK/open-wave-public-benchmarks/blob/main/docs/CLAIMS.md).

  - type: textarea
    id: problem
    attributes:
      label: Related problem / gap
    validations:
      required: false

  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: What should change conceptually — no unsolicited raw payload dumps.
    validations:
      required: true

  - type: textarea
    id: alternates
    attributes:
      label: Alternative approaches evaluated (optional)
    validations:
      required: false

  - type: checkboxes
    id: attest
    attributes:
      label: Confirmations
      options:
        - label: I understand evidence gates / targets remain frozen once a run binds.
          required: true
